# ─────────────────────────────────────────────────────────────────
# Alembic Configuration for SkillMap AI
# ─────────────────────────────────────────────────────────────────
# This file is the primary configuration for Alembic database migrations.
# The sqlalchemy.url is intentionally left blank here — it is set
# programmatically in alembic/env.py from the app's Settings object.
# This prevents duplicating the DATABASE_URL in two places.

[alembic]
script_location = alembic
prepend_sys_path = .

# Leave sqlalchemy.url blank — set in env.py via get_settings()
sqlalchemy.url =

# Timezone for migration timestamps
timezone = UTC

# Format for migration file names: e.g. 20240101_120000_initial_schema.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Output encoding
output_encoding = utf-8


[post_write_hooks]
# Optional: run black formatter on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
